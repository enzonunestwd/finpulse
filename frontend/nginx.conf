server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Suporte ao React Router:
    # Se a rota não existe como arquivo, serve o index.html
    # (o React Router cuida do roteamento no browser)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API backend:
    # Requisições para /api/* são redirecionadas para o container backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
